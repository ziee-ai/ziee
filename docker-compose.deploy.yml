# Deploy overlay for ziee-web. The base docker-compose.yml is a LOCAL test stack
# (hardcoded change-me secrets); this overlay pulls the real secrets + config from
# the environment (TeamCity env params), maps the host gateway so ziee can reach
# the MCP servers / re-host files, and sets a real public file origin.
#
# Deploy (with the sandbox overlay too):
#   docker compose -f docker-compose.yml \
#                  -f docker-compose.sandbox.yaml \
#                  -f docker-compose.deploy.yml up -d --build
#   docker compose -f docker-compose.yml \
#                  -f docker-compose.sandbox.yaml \
#                  -f docker-compose.deploy.yml run --rm ziee-seed   # apply the seed
#
# No secret VALUES live in this file (safe to commit) — they come from the env at
# `up` time. ${VAR:?msg} fails the deploy fast if a required secret is unset.
#
# Deploy-time SEEDING is done by plain SQL (deploy/seed/seed.sql), applied by the
# `ziee-seed` one-shot below — NOT by the app on boot. (The old `desired_state`
# boot reconciler and its ZIEE_APPLY_DESIRED_STATE / ZIEE_DESIRED_STATE_FILE /
# BIOGNOSIA_MCP_URL / RCPA_MCP_URL / DSCC_MCP_URL / ZIEE_ADMIN_* / GOOGLE_* env
# were removed in PR #145; those values now feed `ziee-seed`, not `ziee-web`.)
name: ziee-web

services:
  ziee-web:
    environment:
      ZIEE_DB_PASSWORD: "${ZIEE_DB_PASSWORD:?set ZIEE_DB_PASSWORD}"
      ZIEE_JWT_SECRET: "${ZIEE_JWT_SECRET:?set ZIEE_JWT_SECRET (>=32 chars)}"
      ZIEE_STORAGE_KEY: "${ZIEE_STORAGE_KEY:?set ZIEE_STORAGE_KEY (>=32 chars, STABLE forever)}"
      ZIEE_CORS_ALLOW_ORIGIN: "${ZIEE_CORS_ALLOW_ORIGIN:-http://localhost}"
      ZIEE_MAX_FILE_UPLOAD_MB: "${ZIEE_MAX_FILE_UPLOAD_MB:-128}"
      ZIEE_LOG_LEVEL: "${ZIEE_LOG_LEVEL:-info}"
      ZIEE_LOG_FORMAT: "${ZIEE_LOG_FORMAT:-json}"
      ZIEE_UPDATE_CHECK: "${ZIEE_UPDATE_CHECK:-false}"
      # Origin the MCP-server containers use to fetch ziee-hosted files — reach
      # ziee via the host gateway + its published web port (NOT 127.0.0.1).
      ZIEE_PUBLIC_FILE_ORIGIN: "${ZIEE_PUBLIC_FILE_ORIGIN:-http://host.docker.internal:${ZIEE_WEB_PORT:-8080}}"
    # Lets ziee reach the host-published MCP servers at host.docker.internal:18xxx
    # (same pattern biognosia-mcp / cpa-website use).
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres:
    environment:
      # Must equal ZIEE_DB_PASSWORD (the app authenticates with it).
      POSTGRES_PASSWORD: "${ZIEE_DB_PASSWORD:?set ZIEE_DB_PASSWORD}"

  # ── Deploy-time seed (one-shot) ──────────────────────────────────────────────
  # Applies deploy/seed/seed.sql to the bundled postgres AFTER the app is up.
  #
  # ORDERING: `depends_on: ziee-web: service_healthy`. The app runs its own DB
  # migrations during boot and only reports healthy once it is serving, so by the
  # time this runs every table/column the seed touches already exists. It talks to
  # `postgres` directly (not through ziee-web).
  #
  # RE-RUN CAVEAT: this is `restart: no`, so once it has exited a plain
  # `docker compose up -d` will NOT start it again — an already-exited one-shot is
  # skipped. To re-apply the (idempotent) seed on every deploy, the deploy step
  # MUST force it: `docker compose ... run --rm ziee-seed`  (preferred — blocks and
  # surfaces the exit code) or `... up -d --force-recreate ziee-seed`. See DEPLOY.md.
  #
  # SECRETS: real values arrive as this service's env (from the deploy env) and are
  # handed to psql `-v` vars at runtime via the shell wrapper (robust to spaces in
  # passwords). seed.sql itself carries only `:placeholders`.
  ziee-seed:
    image: pgvector/pgvector:pg18
    depends_on:
      ziee-web:
        condition: service_healthy
    entrypoint: ["bash", "-c"]
    # `$$VAR` → compose emits a literal `$VAR`, so bash (not compose) expands these
    # from the container env AT RUNTIME. Keeps secrets out of the rendered command
    # line / `docker inspect config`, and is robust to spaces/`$` in a password.
    command:
      - |
        exec psql -v ON_ERROR_STOP=1 \
          -v storage_key="$$ZIEE_STORAGE_KEY" \
          -v client_id="$$GOOGLE_CLIENT_ID" \
          -v client_secret="$$GOOGLE_CLIENT_SECRET" \
          -v admin_username="$$ZIEE_ADMIN_USERNAME" \
          -v admin_email="$$ZIEE_ADMIN_EMAIL" \
          -v admin_password="$$ZIEE_ADMIN_PASSWORD" \
          -v rcpa_url="$$RCPA_MCP_URL" \
          -v dscc_url="$$DSCC_MCP_URL" \
          -v biognosia_url="$$BIOGNOSIA_MCP_URL" \
          -f /seed/seed.sql
    environment:
      # psql connection to the bundled postgres.
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: ziee
      PGDATABASE: ziee
      PGPASSWORD: "${ZIEE_DB_PASSWORD:?set ZIEE_DB_PASSWORD}"
      # Values the seed needs (fail fast if a required one is unset).
      ZIEE_STORAGE_KEY: "${ZIEE_STORAGE_KEY:?set ZIEE_STORAGE_KEY (>=32 chars, STABLE forever)}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:?set GOOGLE_CLIENT_ID}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:?set GOOGLE_CLIENT_SECRET}"
      ZIEE_ADMIN_USERNAME: "${ZIEE_ADMIN_USERNAME:?set ZIEE_ADMIN_USERNAME}"
      ZIEE_ADMIN_EMAIL: "${ZIEE_ADMIN_EMAIL:?set ZIEE_ADMIN_EMAIL}"
      ZIEE_ADMIN_PASSWORD: "${ZIEE_ADMIN_PASSWORD:?set ZIEE_ADMIN_PASSWORD}"
      # The org MCP endpoints. Host-published, reached via the host gateway mapped
      # on ziee-web (the deploy host only allows ports 18000-19000).
      RCPA_MCP_URL: "${RCPA_MCP_URL:-http://host.docker.internal:18120/mcp}"
      DSCC_MCP_URL: "${DSCC_MCP_URL:-http://host.docker.internal:18122/mcp}"
      BIOGNOSIA_MCP_URL: "${BIOGNOSIA_MCP_URL:-http://host.docker.internal:18100/mcp}"
    volumes:
      - ./deploy/seed:/seed:ro
    restart: "no"

# Back ziee's named volumes with host directories under /data (the deploy disk)
# instead of Docker's default /var/lib/docker/volumes. The device paths MUST
# exist before `up` — the deploy step does `mkdir -p ${ZIEE_DATA_ROOT}/{pg-data,ziee-data}`.
# ${ZIEE_DATA_ROOT} defaults to /data/ziee.
volumes:
  pg-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${ZIEE_DATA_ROOT:-/data/ziee}/pg-data
  ziee-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${ZIEE_DATA_ROOT:-/data/ziee}/ziee-data
