# Deploy the SAME ziee-web image against an EXTERNAL managed Postgres — no
# bundled DB. This is the shape a TeamCity-deployed environment uses: only the
# ZIEE_DB_* (and secret) env change; the image is identical.
#
# The target Postgres MUST have the `vector` (pgvector) + `pgcrypto` extensions
# available — the server runs its migrations at boot and creates them.
#
#   export ZIEE_DB_HOST=db.internal ZIEE_DB_USER=ziee ZIEE_DB_PASSWORD=... ZIEE_DB_NAME=ziee
#   export ZIEE_JWT_SECRET=... ZIEE_STORAGE_KEY=...
#   docker compose -f docker-compose.external-db.yml up --build
name: ziee-web-external

services:
  ziee-web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    image: ziee-web:local
    environment:
      ZIEE_DB_HOST: ${ZIEE_DB_HOST:?set ZIEE_DB_HOST to your managed Postgres host}
      ZIEE_DB_PORT: ${ZIEE_DB_PORT:-5432}
      ZIEE_DB_USER: ${ZIEE_DB_USER:?set ZIEE_DB_USER}
      ZIEE_DB_PASSWORD: ${ZIEE_DB_PASSWORD:?set ZIEE_DB_PASSWORD}
      ZIEE_DB_NAME: ${ZIEE_DB_NAME:?set ZIEE_DB_NAME}
      ZIEE_JWT_SECRET: ${ZIEE_JWT_SECRET:?set ZIEE_JWT_SECRET (>=32 chars)}
      ZIEE_STORAGE_KEY: ${ZIEE_STORAGE_KEY:?set ZIEE_STORAGE_KEY (>=32 chars)}
    ports:
      - "8080:8080"
    volumes:
      - ziee-data:/var/lib/ziee
    restart: unless-stopped

volumes:
  ziee-data:
