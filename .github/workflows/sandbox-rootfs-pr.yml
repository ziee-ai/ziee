name: sandbox rootfs PR

# Triggers ONLY on PRs touching src-app/sandbox-rootfs/**. Builds the
# rootfs from the PR's pins, smoke-tests it, then cross-tests against
# the MAIN-branch server binary. This is the gate that catches "a
# rootfs change broke the app."

on:
  pull_request:
    paths:
      - 'src-app/sandbox-rootfs/**'
      - '.github/workflows/sandbox-rootfs-pr.yml'
  push:
    branches: [main]
    paths:
      - 'src-app/sandbox-rootfs/**'

concurrency:
  group: sandbox-rootfs-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build → smoke → cross-test
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: install host deps (bubblewrap, squashfuse, squashfs-tools)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bubblewrap squashfuse squashfs-tools

      # ──────────────────────────────────────────────────────────────
      # Build the rootfs from the PR's pins (~10-15 min for full,
      # ~3-5 min for minimal). Use minimal in PR runs to keep CI fast;
      # the full flavor is built only at release time.
      # ──────────────────────────────────────────────────────────────
      - name: build rootfs (minimal flavor)
        run: src-app/sandbox-rootfs/build.sh --flavor minimal

      - name: assert build is reproducible (build twice, diff sha256)
        run: |
          first=$(ls -t .ziee-cache/sandbox-rootfs/*.squashfs | head -1)
          sha1=$(sha256sum "$first" | cut -d' ' -f1)
          rm "$first"
          src-app/sandbox-rootfs/build.sh --flavor minimal
          second=$(ls -t .ziee-cache/sandbox-rootfs/*.squashfs | head -1)
          sha2=$(sha256sum "$second" | cut -d' ' -f1)
          echo "first  sha256: $sha1"
          echo "second sha256: $sha2"
          test "$sha1" = "$sha2" || (echo "REPRODUCIBILITY FAILURE: two builds produced different bytes" >&2; exit 1)

      - name: assert required binaries present + no setuid
        run: |
          sqfs=$(ls -t .ziee-cache/sandbox-rootfs/*.squashfs | head -1)
          mkdir -p /tmp/rootfs-check
          squashfuse "$sqfs" /tmp/rootfs-check
          trap 'fusermount -u /tmp/rootfs-check || true' EXIT
          for bin in /bin/bash /usr/bin/python3 /usr/bin/prlimit /bin/cat /bin/ls /usr/bin/whoami; do
            test -x "/tmp/rootfs-check$bin" || (echo "missing required binary: $bin" >&2; exit 1)
          done
          setuid=$(find /tmp/rootfs-check -xdev \( -perm /u+s -o -perm /g+s \) -type f 2>/dev/null || true)
          if [ -n "$setuid" ]; then
            echo "FAIL: setuid/setgid binaries found in rootfs:" >&2
            echo "$setuid" >&2
            exit 1
          fi

      - name: smoke test (bwrap echo hello)
        run: |
          ZIEE_SANDBOX_ROOTFS=/tmp/rootfs-check bwrap \
            --unshare-user --uid 1001 --gid 1001 \
            --share-net --new-session --die-with-parent \
            --ro-bind /tmp/rootfs-check/usr /usr \
            --symlink usr/bin /bin --symlink usr/lib /lib --symlink usr/lib64 /lib64 \
            --dev-bind /proc /proc --dev /dev --tmpfs /tmp \
            -- /bin/echo hello-from-pr-rootfs

      # ──────────────────────────────────────────────────────────────
      # Cross-test the freshly-built rootfs against the MAIN-branch
      # server binary. This is the answer to "does this rootfs work
      # with the app." If it fails, the PR is broken.
      # ──────────────────────────────────────────────────────────────
      - name: setup rust (for main-branch server cargo test)
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-app/server

      - name: cross-test Tier-4 bwrap-direct
        env:
          ZIEE_SANDBOX_ROOTFS: /tmp/rootfs-check
        working-directory: src-app/server
        run: |
          cargo test --test integration_tests -- --test-threads=1 --ignored code_sandbox::tier4_

      - name: postgres for Tier-6 HTTP-E2E
        run: |
          docker run -d --rm --name pg-tier6 \
            -e POSTGRES_PASSWORD=password \
            -e POSTGRES_DB=postgres \
            -p 54321:5432 \
            --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 10 \
            postgres:16
          for _ in $(seq 1 30); do
            if docker exec pg-tier6 pg_isready -U postgres >/dev/null 2>&1; then break; fi
            sleep 1
          done

      - name: cross-test Tier-6 HTTP-E2E (happy-path subset)
        env:
          ZIEE_SANDBOX_ROOTFS: /tmp/rootfs-check
          DATABASE_URL: postgresql://postgres:password@127.0.0.1:54321/postgres
        working-directory: src-app/server
        run: |
          # Just the smoke + initialize tests; full Tier-6 runs in nightly.
          cargo test --test integration_tests -- --test-threads=1 --ignored \
              code_sandbox::tier6_http_e2e::e2e_initialize_returns_protocol_version_and_server_info \
              code_sandbox::tier6_http_e2e::e2e_tools_list_returns_six_tools_via_real_server \
              code_sandbox::tier6_http_e2e::e2e_execute_command_echo_hello_returns_stdout
