name: sandbox rootfs release

# Builds + signs + publishes the rootfs squashfs artifacts to a
# tagged GitHub Release. Triggered on tag push: `sandbox-rootfs-v*`.

on:
  push:
    tags: ['sandbox-rootfs-v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag version (e.g. v1.r3-x86_64)'
        required: true

permissions:
  contents: write     # for `gh release create`
  id-token: write     # for keyless cosign signing

jobs:
  release:
    name: build + sign + publish
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    strategy:
      matrix:
        flavor: [minimal, full]

    steps:
      - uses: actions/checkout@v4

      - name: install host deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bubblewrap squashfuse squashfs-tools zsync

      - name: install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.0'

      - name: build rootfs (flavor=${{ matrix.flavor }})
        run: src-app/sandbox-rootfs/build.sh --flavor ${{ matrix.flavor }}

      - name: reproducibility check
        run: |
          first=$(ls -t .ziee-cache/sandbox-rootfs/*-${{ matrix.flavor }}.squashfs | head -1)
          sha1=$(sha256sum "$first" | cut -d' ' -f1)
          rm "$first"
          src-app/sandbox-rootfs/build.sh --flavor ${{ matrix.flavor }}
          second=$(ls -t .ziee-cache/sandbox-rootfs/*-${{ matrix.flavor }}.squashfs | head -1)
          sha2=$(sha256sum "$second" | cut -d' ' -f1)
          test "$sha1" = "$sha2" || (echo "REPRODUCIBILITY FAILURE" >&2; exit 1)

      - name: size sanity check
        run: |
          sqfs=$(ls -t .ziee-cache/sandbox-rootfs/*-${{ matrix.flavor }}.squashfs | head -1)
          size=$(stat -c%s "$sqfs")
          # GitHub Releases per-asset cap = 2 GiB.
          if [ "$size" -gt $((2 * 1024 * 1024 * 1024)) ]; then
            echo "FAIL: $sqfs is $size bytes; exceeds GitHub Releases 2 GiB asset cap" >&2
            exit 1
          fi
          # Soft minimum: minimal should be > 50 MB, full > 500 MB.
          if [ "${{ matrix.flavor }}" = "minimal" ] && [ "$size" -lt $((50 * 1024 * 1024)) ]; then
            echo "FAIL: minimal flavor is suspiciously small ($size bytes)" >&2; exit 1
          fi
          if [ "${{ matrix.flavor }}" = "full" ] && [ "$size" -lt $((500 * 1024 * 1024)) ]; then
            echo "FAIL: full flavor is suspiciously small ($size bytes); likely missing packages" >&2; exit 1
          fi

      - name: generate sha256 + zsync sidecars
        run: |
          sqfs=$(ls -t .ziee-cache/sandbox-rootfs/*-${{ matrix.flavor }}.squashfs | head -1)
          sha256sum "$sqfs" > "${sqfs}.sha256"
          zsyncmake -o "${sqfs}.zsync" "$sqfs"

      - name: cosign sign (keyless, GitHub OIDC)
        run: |
          sqfs=$(ls -t .ziee-cache/sandbox-rootfs/*-${{ matrix.flavor }}.squashfs | head -1)
          cosign sign-blob --yes --bundle "${sqfs}.cosign.bundle" "$sqfs"

      - name: publish to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.ref_name }}"
          if [ -z "$tag" ]; then tag="${{ github.event.inputs.version }}"; fi
          gh release upload "$tag" \
            .ziee-cache/sandbox-rootfs/*-${{ matrix.flavor }}.squashfs \
            .ziee-cache/sandbox-rootfs/*-${{ matrix.flavor }}.squashfs.sha256 \
            .ziee-cache/sandbox-rootfs/*-${{ matrix.flavor }}.squashfs.zsync \
            .ziee-cache/sandbox-rootfs/*-${{ matrix.flavor }}.squashfs.cosign.bundle \
            --clobber
