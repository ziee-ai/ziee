name: sandbox integration (nightly)

# Drift detector: nightly + on-demand. Fetches the latest published
# rootfs, builds the main-branch server, runs the FULL bwrap-dependent
# integration test suite. Catches:
#   - A published rootfs that worked at release time but broke against
#     subsequent server changes.
#   - Upstream apt-cacher / pip / CRAN package changes that we picked
#     up in a rebuild.
#   - Kernel changes on GitHub-hosted runners.
#
# On failure, opens an auto-labeled `sandbox-drift` issue.

on:
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC daily
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write   # for opening drift issues

jobs:
  nightly:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: postgres
        ports: [54321:5432]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: install host deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bubblewrap squashfuse squashfs-tools

      - name: install cosign
        uses: sigstore/cosign-installer@v3

      - name: fetch latest published rootfs (minimal flavor)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find the latest sandbox-rootfs tag.
          tag=$(gh release list --limit 50 \
            --json tagName,createdAt \
            --jq '.[] | select(.tagName | startswith("sandbox-rootfs-v")) | .tagName' \
            | head -1)
          if [ -z "$tag" ]; then
            echo "no sandbox-rootfs-* tag found yet; bootstrapping is incomplete — skipping nightly"
            exit 0
          fi
          mkdir -p .ziee-cache/sandbox-rootfs
          gh release download "$tag" \
            --pattern "*minimal*.squashfs" \
            --pattern "*minimal*.squashfs.sha256" \
            --pattern "*minimal*.squashfs.cosign.bundle" \
            --dir .ziee-cache/sandbox-rootfs

      - name: verify sha256 + cosign
        run: |
          set -euo pipefail
          sqfs=$(ls .ziee-cache/sandbox-rootfs/*minimal*.squashfs)
          (cd "$(dirname "$sqfs")" && sha256sum -c "$(basename "$sqfs").sha256")
          cosign verify-blob "$sqfs" \
            --bundle "${sqfs}.cosign.bundle" \
            --certificate-identity-regexp '^https://github.com/phibya/ziee-chat/' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com

      - name: mount via squashfuse
        run: |
          sqfs=$(ls .ziee-cache/sandbox-rootfs/*minimal*.squashfs)
          mkdir -p /tmp/rootfs-nightly
          squashfuse "$sqfs" /tmp/rootfs-nightly

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-app/server

      - name: run bwrap-dependent integration tests
        working-directory: src-app/server
        env:
          ZIEE_SANDBOX_ROOTFS: /tmp/rootfs-nightly
          DATABASE_URL: postgresql://postgres:password@127.0.0.1:54321/postgres
        run: |
          cargo test --test integration_tests -- --test-threads=1 --ignored code_sandbox::

      - name: open drift issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `sandbox-drift: nightly ${today}`,
              body: `Nightly sandbox integration suite failed against the latest published rootfs.\n\nWorkflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['sandbox-drift'],
            });
