name: sandbox integration (nightly)

# Drift detector: nightly + on-demand. Fetches the latest published
# rootfs, builds the main-branch server, runs the FULL bwrap-dependent
# integration test suite. Catches:
#   - A published rootfs that worked at release time but broke against
#     subsequent server changes.
#   - Upstream apt-cacher / pip / CRAN package changes that we picked
#     up in a rebuild.
#   - Kernel changes on GitHub-hosted runners.
#
# On failure, opens an auto-labeled `sandbox-drift` issue.

on:
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC daily
  workflow_dispatch:
    inputs:
      run_llm_tests:
        description: 'Also run Tier-5 real-LLM tests (requires ANTHROPIC_API_KEY secret; ~$0.30 per run)'
        required: false
        default: 'false'

permissions:
  contents: read
  issues: write   # for opening drift issues

jobs:
  nightly:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: postgres
        ports: [54321:5432]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: install host deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bubblewrap squashfuse squashfs-tools libseccomp-dev

      - name: install cosign
        uses: sigstore/cosign-installer@v3

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-app/server

      - name: build server (so fetch-sandbox-rootfs has the binary)
        working-directory: src-app/server
        run: cargo build --release --bin ziee-chat --features code_sandbox_seccomp

      # Use the SAME verification path Dockerfile.prod and operators
      # use: the binary's `fetch-sandbox-rootfs` subcommand verifies
      # against the embedded known_revisions.toml (Option B), and
      # cosign-verifies against the anchored identity regex
      # (sandbox-rootfs-release.yml@refs/tags/*) when the entry has
      # `signed = true` (hybrid C). Earlier versions of this workflow
      # used `gh release download` + `sha256sum -c <fetched.sha256>`,
      # which is TOFU (Option A) — a compromised release would have
      # been accepted because both the squashfs and its sha256
      # come from the same source. Switched to the embedded-pin
      # path so the nightly catches the same regression classes
      # operators would.
      - name: fetch + verify latest published rootfs (Option B)
        working-directory: src-app/server
        run: |
          set -euo pipefail
          # Verify a tag exists before invoking the binary, so we can
          # exit 0 cleanly if no release has been bootstrapped yet.
          if ! gh release list --limit 200 --json tagName \
              --jq '.[] | select(.tagName | startswith("sandbox-rootfs-v"))' \
              | grep -q .; then
            echo "no sandbox-rootfs-* tag found yet; bootstrapping is incomplete — skipping nightly"
            exit 0
          fi
          # `fetch-sandbox-rootfs --version=latest` resolves the
          # highest non-yanked entry in known_revisions.toml,
          # downloads from GitHub Releases (or
          # CODE_SANDBOX_ROOTFS_MIRROR), sha256-verifies, cosign-
          # verifies if signed=true, and atomic-installs.
          target/release/ziee-chat fetch-sandbox-rootfs \
              --version=latest --flavor=minimal
        env:
          GH_TOKEN: ${{ github.token }}

      - name: mount via squashfuse
        working-directory: src-app/server
        run: |
          sqfs=$(ls .ziee-cache/sandbox-rootfs/ziee-sandbox-rootfs-*.squashfs | head -1)
          mkdir -p /tmp/rootfs-nightly
          squashfuse "$sqfs" /tmp/rootfs-nightly

      - name: run bwrap-dependent integration tests (Tier 4 + Tier 6)
        working-directory: src-app/server
        env:
          ZIEE_SANDBOX_ROOTFS: /tmp/rootfs-nightly
          DATABASE_URL: postgresql://postgres:password@127.0.0.1:54321/postgres
        run: |
          cargo test --test integration_tests -- --test-threads=1 --ignored \
              code_sandbox::tier4_ \
              code_sandbox::tier6_

      - name: run Tier-5 real-LLM tests (opt-in)
        if: ${{ github.event.inputs.run_llm_tests == 'true' }}
        working-directory: src-app/server
        env:
          ZIEE_SANDBOX_ROOTFS: /tmp/rootfs-nightly
          DATABASE_URL: postgresql://postgres:password@127.0.0.1:54321/postgres
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ANTHROPIC_API_KEY secret not set; skipping Tier-5"
            exit 0
          fi
          cargo test --test integration_tests -- --test-threads=1 --ignored \
              chat::sandbox_real_llm

      - name: cleanup old rootfs squashfs files
        if: always()
        working-directory: src-app/server
        run: |
          cargo run -q --bin ziee-chat -- gc-sandbox-rootfs --keep=2 || true

      - name: open drift issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `sandbox-drift: nightly ${today}`,
              body: `Nightly sandbox integration suite failed against the latest published rootfs.\n\nWorkflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['sandbox-drift'],
            });
