# ziee server config TEMPLATE — rendered at container start by entrypoint.sh
# (envsubst) into /tmp/ziee/config.yaml, unless a config is bind-mounted at
# /etc/ziee/config.yaml. Only ${...} placeholders are substituted; every value
# has a default supplied via ENV in the Dockerfile.
#
# The server reads config ONLY from a YAML file (no per-key env overrides), so
# this template is how ZIEE_* env vars reach the running server.

app:
  data_dir: "/var/lib/ziee/data"

# External Postgres. Point ZIEE_DB_* at the bundled compose `postgres` service
# or a managed DB. The target MUST have the `vector` (pgvector) and `pgcrypto`
# extensions available — migrations run automatically at boot and create them.
postgresql:
  use_embedded: false
  external:
    host: "${ZIEE_DB_HOST}"
    port: ${ZIEE_DB_PORT}
    username: "${ZIEE_DB_USER}"
    password: "${ZIEE_DB_PASSWORD}"
    database: "${ZIEE_DB_NAME}"
  pool:
    max_connections: 20
    min_connections: 2
    acquire_timeout_secs: 10
    idle_timeout_secs: 60
    max_lifetime_secs: 1800

# Loopback-only: only the in-container nginx reaches the server. nginx binds the
# public :8080 and proxies here. Keep host/port/api_prefix in lockstep with
# docker/web/nginx.conf (proxy_pass 127.0.0.1:9000).
server:
  host: "127.0.0.1"
  port: 9000
  api_prefix: "/api"
  # nginx sets X-Forwarded-* (and strips inbound), so trust them for OAuth
  # redirect_uri derivation.
  trust_forwarded_headers: true
  # Disabled: behind nginx every client shares the loopback source IP, so the
  # per-IP limiter would throttle all users as one. Re-enable + widen if you
  # front this with a per-client key extractor.
  rate_limit:
    enabled: false
    per_second: 50
    burst_size: 500
  # The SPA and /api are same-origin (both served by nginx on :8080), so the
  # browser never issues a cross-origin request and this list is not exercised
  # by the delivered site. Default to the local origin (not "*", which would log
  # a permissive-CORS security warning every boot). Set ZIEE_CORS_ALLOW_ORIGIN to
  # your real external origin if you also serve cross-origin API clients.
  cors:
    allow_origins: ["${ZIEE_CORS_ALLOW_ORIGIN}"]
    allow_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
    allow_headers: ["Content-Type", "Authorization"]

logging:
  level: "${ZIEE_LOG_LEVEL}"
  format: "${ZIEE_LOG_FORMAT}"

jwt:
  secret: "${ZIEE_JWT_SECRET}"
  issuer: "ziee"
  audience: "ziee-api"
  access_token_expiry_hours: 24
  refresh_token_expiry_days: 30

# bwrap sandbox needs user namespaces / host deps — off in the container.
code_sandbox:
  enabled: false

# At-rest encryption for stored credentials. Set a stable ZIEE_STORAGE_KEY
# (>=32 chars) per deployment; losing it makes encrypted secrets unrecoverable.
secrets:
  storage_key: "${ZIEE_STORAGE_KEY}"

# No outbound version check from the container.
update_check:
  enabled: ${ZIEE_UPDATE_CHECK}
