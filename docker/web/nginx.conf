# ziee-web nginx: serve the SPA + reverse-proxy /api to the loopback ziee server.
# Runs as the non-root `ziee` user (master + workers), so pid/temp/logs all live
# under writable paths and it listens on an unprivileged port (8080).

worker_processes auto;
daemon off;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    access_log    /dev/stdout;

    # Non-root-writable temp paths (default /var/lib/nginx/* needs root).
    client_body_temp_path /tmp/nginx-client;
    proxy_temp_path       /tmp/nginx-proxy;
    fastcgi_temp_path     /tmp/nginx-fastcgi;
    uwsgi_temp_path       /tmp/nginx-uwsgi;
    scgi_temp_path        /tmp/nginx-scgi;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    server_tokens   off;

    # Model/file uploads flow through this proxy; keep the cap generous.
    client_max_body_size 1024m;

    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types        text/plain text/css application/javascript application/json
                      image/svg+xml application/wasm font/woff2;

    server {
        listen      8080;
        server_name _;
        root        /srv/www;
        index       index.html;

        # API + all SSE/streaming endpoints (chat stream, sync subscribe,
        # hardware usage, download progress, workflow-run events, …) live under
        # /api. The ziee server binds loopback:9000 inside this container.
        location /api {
            proxy_pass http://127.0.0.1:9000;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # X-Forwarded-Host is what the server uses to derive the OAuth
            # redirect_uri (config: trust_forwarded_headers: true).
            proxy_set_header X-Forwarded-Host  $host;
            # Clear the hop-by-hop Connection header so keep-alive holds the
            # long-lived SSE responses open.
            proxy_set_header Connection        "";

            # SSE correctness: never buffer or cache the streamed responses, and
            # give long-lived streams room to breathe.
            proxy_buffering         off;
            proxy_cache             off;
            proxy_request_buffering off;
            proxy_read_timeout      3600s;
            proxy_send_timeout      3600s;
            chunked_transfer_encoding on;
        }

        # SPA: BrowserRouter needs deep links / reloads to fall back to index.html.
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Hashed, immutable Vite assets → long cache.
        location /assets/ {
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
