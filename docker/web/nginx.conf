# ziee-web nginx: serve the SPA + reverse-proxy /api to the loopback ziee server.
# Runs as the non-root `ziee` user (master + workers), so pid/temp/logs all live
# under writable paths and it listens on an unprivileged port (8080).

worker_processes auto;
daemon off;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    access_log    /dev/stdout;

    # Non-root-writable temp paths (default /var/lib/nginx/* needs root).
    client_body_temp_path /tmp/nginx-client;
    proxy_temp_path       /tmp/nginx-proxy;
    fastcgi_temp_path     /tmp/nginx-fastcgi;
    uwsgi_temp_path       /tmp/nginx-uwsgi;
    scgi_temp_path        /tmp/nginx-scgi;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    server_tokens   off;

    # Model/file uploads flow through this proxy. Invariant: this must stay
    # >= the server's derived upload body limit (max_file_upload_mb + 16 MiB),
    # which must be >= the per-file cap. 1024m covers any cap up to ~1000 MiB;
    # raise this if you set ZIEE_MAX_FILE_UPLOAD_MB above that.
    client_max_body_size 1024m;

    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types        text/plain text/css application/javascript application/json
                      image/svg+xml application/wasm font/woff2;

    # Honor the scheme the OUTERMOST proxy (Cloudflare / campus edge) saw the
    # client use. When ziee is published behind an HTTPS edge that terminates
    # TLS and forwards plain HTTP to this container, `$scheme` here is `http`,
    # so the server would derive `http://` OAuth redirect_uris + file origins —
    # which breaks Google login (Google rejects non-localhost http redirect
    # URIs). Prefer the inbound X-Forwarded-Proto when an edge set it; fall back
    # to `$scheme` for direct/local access so dev stays http.
    map $http_x_forwarded_proto $ziee_forwarded_proto {
        default $http_x_forwarded_proto;
        ''      $scheme;
    }

    server {
        listen      8080;
        server_name _;
        root        /srv/www;
        index       index.html;

        # API + all SSE/streaming endpoints (chat stream, sync subscribe,
        # hardware usage, download progress, workflow-run events, …) live under
        # /api. The ziee server binds loopback:9000 inside this container.
        location /api {
            proxy_pass http://127.0.0.1:9000;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $ziee_forwarded_proto;
            # X-Forwarded-Host is what the server uses to derive the OAuth
            # redirect_uri (config: trust_forwarded_headers: true).
            proxy_set_header X-Forwarded-Host  $host;
            # Clear the hop-by-hop Connection header so keep-alive holds the
            # long-lived SSE responses open.
            proxy_set_header Connection        "";

            # SSE correctness: never buffer or cache the streamed responses, and
            # give long-lived streams room to breathe.
            proxy_buffering         off;
            proxy_cache             off;
            proxy_request_buffering off;
            proxy_read_timeout      3600s;
            proxy_send_timeout      3600s;
            chunked_transfer_encoding on;

            # Signal to any OUTER reverse proxy that this response must not be
            # buffered. Disabling proxy_buffering above only stops THIS nginx
            # from buffering; when ziee is published behind a further proxy
            # (e.g. a Coder/ingress `nginx` in front), that edge buffers `/api`
            # SSE by default — holding frames in its proxy buffers until they
            # fill or the stream ends — so chat streaming and all other `/api`
            # SSE never arrive. An `X-Accel-Buffering: no` response header is the
            # standard signal an nginx-family edge honors to stream un-buffered.
            # The axum server cannot deliver it: nginx CONSUMES the upstream
            # `X-Accel-Buffering` header (acts on it, does not forward it), so
            # the server-set copy never leaves this container. Re-emit it here so
            # it survives to the edge. The streamed SSE responses are 200s, which
            # nginx's default `add_header` already covers; `always` just extends
            # it to non-2xx (error) responses too. (Applying it to every `/api`
            # response, not just SSE, is harmless: on small JSON it is a no-op.)
            add_header X-Accel-Buffering no always;
        }

        # SPA: BrowserRouter needs deep links / reloads to fall back to index.html.
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Hashed, immutable Vite assets → long cache.
        location /assets/ {
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
