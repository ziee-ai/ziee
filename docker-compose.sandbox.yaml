# Opt-in overlay: enable code_sandbox in the ziee-web container.
#
# Apply ON TOP of docker-compose.yml (this keeps the base `name: ziee-web`, so
# the container stays `ziee-web-ziee-web-1`):
#
#   sudo docker compose -f docker-compose.yml -f docker-compose.sandbox.yaml up -d --build
#
# Registration + the graceful "Rootfs environments" admin list work with ONLY
# the ZIEE_CODE_SANDBOX_ENABLED flag (the boot probe just needs bwrap on PATH,
# which the image now ships). Real sandboxed EXECUTION (the first execute_command
# → squashfuse mount + bwrap PID-namespace) additionally needs /dev/fuse and
# unprivileged user namespaces — granted here with minimal capabilities.
#
# On a host that RESTRICTS unprivileged user namespaces
# (kernel.unprivileged_userns_clone=0, or an AppArmor userns restriction such as
# Ubuntu 23.10+'s), the bwrap PID-ns probe fails at first execute_command.
# Replace the devices/cap_add/security_opt block below with `privileged: true`
# (see docker/web/README.md → "Code sandbox (opt-in)").
#
# SECURITY: enabling this grants LLM-generated code an isolated-but-privileged
# execution surface on the host. Keep it OPT-IN — never fold it into the base
# compose / general image. The container also needs outbound access to
# api.github.com (rootfs catalog + fetch).
name: ziee-web

services:
  ziee-web:
    environment:
      ZIEE_CODE_SANDBOX_ENABLED: "true"
    # Minimal capabilities for bwrap (user namespaces) + squashfuse (/dev/fuse).
    # Least privilege; swap all three keys for `privileged: true` on hosts that
    # restrict unprivileged userns.
    devices:
      - "/dev/fuse"
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
      - seccomp:unconfined
