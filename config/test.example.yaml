# Test configuration for shared embedded PostgreSQL instance
# This is used by the test infrastructure to start a single shared PostgreSQL
# Individual test servers connect to this as "external" with unique databases

postgresql:
  version: "17.5.0"
  port: 54322  # Fixed port for shared test PostgreSQL instance
  bind_address: "127.0.0.1"
  username: "postgres"
  password: "password"
  database: "postgres"

  # Directories for embedded PostgreSQL test instance
  installation_dir: "../../ziee-chat-data/test/postgres"
  data_dir: "../../ziee-chat-data/test/postgres-data"

  # Timezone settings
  timezone: "UTC"
  log_timezone: "UTC"

  # Logging configuration
  logging:
    collector: true
    directory: "log"
    filename: "postgresql-test-%Y-%m-%d_%H%M%S.log"
    statement: "all"
