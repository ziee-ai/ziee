# Build configuration for PostgreSQL development environment
# This file is used by src-postgres-dev for setting up the development database

postgresql:
  version: "17.5.0"
  port: 54321
  bind_address: "127.0.0.1"
  username: "postgres"
  password: "password"
  database: "postgres"

  # Directories (relative to project root)
  installation_dir: "../../ziee-chat-data/build-postgres/postgres"
  data_dir: "../../ziee-chat-data/build-postgres/data"

  # Timezone settings
  timezone: "UTC"
  log_timezone: "UTC"

  # Logging configuration
  logging:
    collector: true
    directory: "log"
    filename: "postgresql-%Y-%m-%d_%H%M%S.log"
    statement: "all"

  # Connection pool settings
  pool:
    max_connections: 5
    min_connections: 1
    acquire_timeout_secs: 5

# Migration settings
migrations:
  path: "../src-web/migrations"
