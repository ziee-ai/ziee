# ziee web (SPA) nginx — serves the built Vite SPA and reverse-proxies /api to
# the SEPARATE API container (ziee-web:9000). The SDK server is API-ONLY and does
# NOT serve the SPA, so this nginx is a distinct service (unlike the old fat
# single-container image that ran ziee + nginx together).
#
# Runs as the stock nginx image's default (root master, unprivileged workers).
# Listens on 8080 in-container; the compose service publishes it on the host.

worker_processes auto;
pid /var/run/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    access_log    /dev/stdout;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    server_tokens   off;

    # Model/file uploads flow through this proxy. Keep >= the server's derived
    # upload body limit (max_file_upload_mb + 16 MiB). 1024m covers caps up to
    # ~1000 MiB; raise if you raise the server cap.
    client_max_body_size 1024m;

    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types        text/plain text/css application/javascript application/json
                      image/svg+xml application/wasm font/woff2;

    # Honor the scheme the OUTERMOST proxy (campus edge / Cloudflare) saw — when
    # TLS is terminated upstream and plain HTTP is forwarded here, $scheme is
    # http, which would break Google OAuth redirect derivation. Prefer inbound
    # X-Forwarded-Proto; fall back to $scheme for direct/local http.
    map $http_x_forwarded_proto $ziee_forwarded_proto {
        default $http_x_forwarded_proto;
        ''      $scheme;
    }

    upstream ziee_api {
        server ziee-web:9000;
    }

    server {
        listen      8080;
        server_name _;
        root        /srv/www;
        index       index.html;

        # API + all SSE/streaming endpoints (chat stream, sync subscribe,
        # hardware usage, download progress, workflow-run events, …). The SDK
        # API server binds :9000 in the ziee-web container.
        location /api {
            proxy_pass http://ziee_api;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $ziee_forwarded_proto;
            # X-Forwarded-Host feeds the server's OAuth redirect_uri derivation
            # (config: trust_forwarded_headers: true).
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header Connection        "";

            # SSE correctness: never buffer/cache; give long streams room.
            proxy_buffering         off;
            proxy_cache             off;
            proxy_request_buffering off;
            proxy_read_timeout      3600s;
            proxy_send_timeout      3600s;
            chunked_transfer_encoding on;

            # Tell any OUTER nginx edge not to buffer /api SSE (it consumes the
            # server-set copy of this header, so re-emit here).
            add_header X-Accel-Buffering no always;
        }

        # SPA deep links / reloads fall back to index.html.
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Hashed, immutable Vite assets → long cache.
        location /assets/ {
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
