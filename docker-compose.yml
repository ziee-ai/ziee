# Local test stack for the ziee web image: the combined ziee-web container
# (Rust API + nginx-served SPA) plus a bundled pgvector Postgres.
#
#   docker compose up --build      # build + boot the whole stack
#   open http://localhost:8080     # the website
#   ZIEE_WEB_PORT=8090 docker compose up   # override the host port (e.g. parallel stacks)
#
# The SAME image deploys against an EXTERNAL managed Postgres by only changing
# the ZIEE_DB_* env — see docker-compose.external-db.yml and docker/web/README.md.
name: ziee-web

services:
  ziee-web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    image: ziee-web:local
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ZIEE_DB_HOST: postgres
      ZIEE_DB_PORT: "5432"
      ZIEE_DB_USER: ziee
      ZIEE_DB_PASSWORD: ziee
      ZIEE_DB_NAME: ziee
      # CHANGE-ME for anything but local testing (>=32 chars each).
      ZIEE_JWT_SECRET: ziee-local-compose-jwt-secret-change-me-32chars
      ZIEE_STORAGE_KEY: ziee-local-compose-storage-key-change-me-32chars
      # Origin OTHER MCP servers use to fetch files ziee exposes via
      # get_resource_link. Must be reachable from those containers (host gateway
      # + published web port), NOT 127.0.0.1. Override per deployment.
      ZIEE_PUBLIC_FILE_ORIGIN: "${ZIEE_PUBLIC_FILE_ORIGIN:-http://172.21.0.1:${ZIEE_WEB_PORT:-8080}}"
      # Config-as-code (see docker/web/README.md). The image reconciles
      # /etc/ziee/desired-state.yaml into the DB on boot; these fill its
      # ${...} placeholders. Each is OPTIONAL — an unset one simply skips its
      # entry (no server / no admin / no user), it never blocks the boot.
      RCPA_MCP_URL: "${RCPA_MCP_URL:-}"
      DSCC_MCP_URL: "${DSCC_MCP_URL:-}"
      BIOGNOSIA_MCP_URL: "${BIOGNOSIA_MCP_URL:-}"
      ZIEE_ADMIN_PASSWORD: "${ZIEE_ADMIN_PASSWORD:-}"
      ZIEE_DEFAULT_USER_PASSWORD: "${ZIEE_DEFAULT_USER_PASSWORD:-}"
    ports:
      # Host port is configurable so parallel stacks (e.g. multiple worktrees)
      # don't collide on 8080; the in-container port stays 8080. Default keeps 8080.
      - "${ZIEE_WEB_PORT:-8080}:8080"
    volumes:
      - ziee-data:/var/lib/ziee
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: ziee
      POSTGRES_PASSWORD: ziee
      POSTGRES_DB: ziee
    volumes:
      # Postgres 18+ images store data in a major-version subdir and require the
      # mount at /var/lib/postgresql (NOT /var/lib/postgresql/data).
      - pg-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ziee -d ziee"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  ziee-data:
  pg-data:
