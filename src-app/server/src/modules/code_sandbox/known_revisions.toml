# list at runtime with a misleading "no published releases yet" error):
#   [[revision]]
#   schema = 1
#   revision = "r0"
#   arch = "x86_64"
#   flavor = "minimal"        # or "full"
#   sha256 = "abc123..."       # lowercase 64-hex; case-normalized at read
#   signed = true              # if absent or false → cosign skip on miss
#                              # if true → REQUIRE cosign + bundle (fail closed)
#   yanked = false             # if true → excluded from `--version=latest`

