# Production runtime configuration template for ziee web backend.
# Copy to `prod.yaml` and override sensitive values per deployment.

# Application settings
app:
  data_dir: "/var/lib/ziee/data"

# PostgreSQL — external recommended for prod.
postgresql:
  use_embedded: false
  external:
    host: "postgres.internal"
    port: 5432
    username: "ziee"
    password: "REPLACE_ME"
    database: "ziee"
  pool:
    max_connections: 50
    min_connections: 5
    acquire_timeout_secs: 10
    idle_timeout_secs: 60
    max_lifetime_secs: 1800

# HTTP server
server:
  host: "0.0.0.0"
  port: 9000
  api_prefix: "/api"
  # Global per-IP rate limiter (tower-governor). Keep enabled on public
  # deployments. per_second/burst_size default to 50/500 when omitted —
  # wide enough that a normal SPA cold-load (~15-25 parallel calls) doesn't
  # 429; tighten once you've measured normal demand, or behind a reverse
  # proxy that NATs all users to one IP, raise these / swap the key extractor.
  # The built-in code_sandbox + memory MCP servers are reached over loopback
  # and share the 127.0.0.1 bucket, so if agent tool loops self-throttle
  # (HTTP 429), raise the limits rather than disabling — enabled: false
  # removes throttling for ALL traffic, including external.
  rate_limit:
    enabled: true
    per_second: 50
    burst_size: 500
  cors:
    allow_origins: ["https://chat.example.com"]
    allow_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
    allow_headers: ["Content-Type", "Authorization"]

# Logging
logging:
  level: "info"
  format: "json"

# JWT — MUST override `secret` per deployment.
jwt:
  secret: "REPLACE_ME_WITH_A_LONG_RANDOM_SECRET_AT_LEAST_32_CHARS"
  issuer: "ziee"
  audience: "ziee-api"
  access_token_expiry_hours: 24
  refresh_token_expiry_days: 30

# Code sandbox (bwrap-isolated execution; built-in MCP server).
# Production deployment requirements:
#   - bubblewrap installed on the host
#   - rootfs squashfs mounted via squashfuse at `rootfs_path`
#   - delegated cgroup parent at `cgroup_parent` (owned by server uid)
# Without those, leave `enabled: false`.
code_sandbox:
  enabled: false
  rootfs_path: "/var/lib/ziee/sandbox-rootfs/current"
  cgroup_parent: "/sys/fs/cgroup/ziee-sandbox.slice"
