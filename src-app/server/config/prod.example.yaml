# Production runtime configuration template for ziee web backend.
# Copy to `prod.yaml` and override sensitive values per deployment.

# Application settings
app:
  data_dir: "/var/lib/ziee/data"

# PostgreSQL — external recommended for prod.
postgresql:
  use_embedded: false
  external:
    host: "postgres.internal"
    port: 5432
    username: "ziee"
    password: "REPLACE_ME"
    database: "ziee"
  pool:
    max_connections: 50
    min_connections: 5
    acquire_timeout_secs: 10
    idle_timeout_secs: 60
    max_lifetime_secs: 1800

# HTTP server
server:
  host: "0.0.0.0"
  port: 9000
  api_prefix: "/api"
  # Honor X-Forwarded-Host / X-Forwarded-Proto when deriving the OAuth
  # redirect_uri. Default false.
  #   Set true ONLY when this server sits behind a reverse proxy that STRIPS
  #   inbound X-Forwarded-* and sets them itself (nginx proxy_set_header,
  #   Caddy header_up, Cloudflare / Vercel / Fly defaults). Most prod
  #   deployments terminate TLS at such a proxy and want true — but confirm
  #   your proxy strips the inbound headers first.
  #   If the server is exposed directly, leave false: otherwise an attacker
  #   can send X-Forwarded-Host: evil.com and a permissive IdP hands them the
  #   OAuth code.
  trust_forwarded_headers: false
  # Global per-IP rate limiter (tower-governor). Keep enabled on public
  # deployments. per_second/burst_size default to 50/500 when omitted —
  # wide enough that a normal SPA cold-load (~15-25 parallel calls) doesn't
  # 429; tighten once you've measured normal demand, or behind a reverse
  # proxy that NATs all users to one IP, raise these / swap the key extractor.
  # The built-in code_sandbox + memory MCP servers are reached over loopback
  # and share the 127.0.0.1 bucket, so if agent tool loops self-throttle
  # (HTTP 429), raise the limits rather than disabling — enabled: false
  # removes throttling for ALL traffic, including external.
  rate_limit:
    enabled: true
    per_second: 50
    burst_size: 500
  cors:
    allow_origins: ["https://chat.example.com"]
    allow_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
    # Add "X-Refresh-Cookie" ONLY for cross-origin browser deployments (SPA on
    # a different origin than the API) — the web client sends it to opt into
    # httpOnly refresh-token cookies. Same-origin deployments don't need it.
    allow_headers: ["Content-Type", "Authorization"]

# Logging
logging:
  level: "info"
  format: "json"

# JWT — MUST override `secret` per deployment.
jwt:
  secret: "REPLACE_ME_WITH_A_LONG_RANDOM_SECRET_AT_LEAST_32_CHARS"
  issuer: "ziee"
  audience: "ziee-api"
  # Initial seed for the DB-backed session settings (migration 129):
  # copied into the DB once at first boot; manage on /settings/sessions
  # afterwards. Kept as the mint-time fallback if the DB read fails.
  access_token_expiry_hours: 24
  refresh_token_expiry_days: 30

# Code sandbox (bwrap-isolated execution; built-in MCP server).
# Production deployment requirements:
#   - bubblewrap installed on the host
#   - rootfs squashfs mounted via squashfuse at `rootfs_path`
#   - delegated cgroup parent at `cgroup_parent` (owned by server uid)
# Without those, leave `enabled: false`.
code_sandbox:
  enabled: false
  rootfs_path: "/var/lib/ziee/sandbox-rootfs/current"
  cgroup_parent: "/sys/fs/cgroup/ziee-sandbox.slice"
  # Optional knobs below (defaults shown):
  # workspace_root: "<app.data_dir>/sandboxes"   # per-conversation workspaces
  # require_download_consent: true     # prompt before a first rootfs download
  # auto_download_under_mb: 100        # flavors smaller than this skip the prompt
  # allow_wsl2_mirrored_mode: false    # Windows: allow WSL2 networkingMode=mirrored
  # allow_cloud_imds_reachable: false  # allow when 169.254.169.254 (cloud IMDS) is reachable
  # public_base_url: ""                # root MCP resource links at a tunnel/proxy URL

# At-rest encryption for stored credentials (LLM provider api_keys, LLM
# repository auth tokens, per-user provider keys). STRONGLY RECOMMENDED in
# production: when unset, these are stored in PLAINTEXT in the database and are
# reachable in DB dumps/backups. Set a stable random key (min 32 chars), keep it
# out of version control, and back it up — changing or losing it makes
# previously-encrypted secrets unrecoverable.
secrets:
  storage_key: "CHANGE-ME-to-a-stable-random-string-min-32-chars"

# Per-cache path overrides. All optional — each defaults to a subdir of
# app.data_dir. Override individual entries to put a cache on a dedicated
# volume (e.g. HF models on bulk storage, git/lfs caches on fast local disk).
# caches:
#   hf_models_dir: "/var/lib/ziee/data/hf-models"      # HuggingFace downloads
#   llm_engines_dir: "/var/lib/ziee/data/llm-engines"  # llama.cpp / mistralrs binaries
#   git_cache_dir: "/var/lib/ziee/data/cache/git"      # Hub repository clones
#   lfs_cache_dir: "/var/lib/ziee/data/cache/lfs"      # Git LFS objects

# Daily check against the GitHub Releases API for a newer ziee.
# NOTIFICATION ONLY — never downloads or installs; admins update via install.sh.
# Set enabled: false for air-gapped deployments (no outbound calls, no banner).
update_check:
  enabled: true
