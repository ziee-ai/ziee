# Local-only dev config — macOS paths + Vite port 1420 in CORS.
# Not committed (gitignore'd via *.local.yaml or run-only). Mirrors
# config/dev.yaml otherwise.

app:
  data_dir: "/Users/bya/.ziee/dev/app-data"

postgresql:
  use_embedded: true
  embedded:
    version: "18.3.0"
    port: 0
    bind_address: "127.0.0.1"
    username: "postgres"
    password: "password"
    database: "postgres"
    installation_dir: "/Users/bya/.ziee/dev/postgres"
    data_dir: "/Users/bya/.ziee/dev/postgres-data"
    timezone: "UTC"
    log_timezone: "UTC"
    logging:
      collector: true
      directory: "log"
      filename: "postgresql-%Y-%m-%d_%H%M%S.log"
      statement: "ddl"
  external:
    host: "localhost"
    port: 5432
    username: "postgres"
    password: "password"
    database: "ziee_chat_dev"
  pool:
    max_connections: 10
    min_connections: 1
    acquire_timeout_secs: 5
    idle_timeout_secs: 30
    max_lifetime_secs: 300

server:
  host: "127.0.0.1"
  port: 3000
  api_prefix: "/api"
  trust_forwarded_headers: true
  rate_limit:
    per_second: 50
    burst_size: 500
  cors:
    allow_origins:
      - "http://localhost:5173"
      - "http://localhost:3000"
      - "http://localhost:1420"
    allow_methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
    allow_headers:
      - "Content-Type"
      - "Authorization"

logging:
  level: "info"
  format: "pretty"

jwt:
  secret: "i6siCdRTK/3SIGSxOjmDgSjtRX7HRJPij5TWvs2dHE471hxxPldOuPqmZd2oxkZW"
  issuer: "ziee"
  audience: "ziee-api"
  access_token_expiry_hours: 24
  refresh_token_expiry_days: 30

secrets:
  storage_key: "1s1fEYlKh7TYOokirLRv3k6oKm5YvXz32t/jFmyKdtk1mrQZduBEBrLszeEU0Atu"
