# Development runtime configuration for ziee-chat web backend
# This file is used by src-web when running the application

# Application settings
app:
  data_dir: "/home/pbya/projects/ziee-chat-data/dev/app-data"  # Directory for models, caches, and temporary files

# PostgreSQL connection settings
postgresql:
  # Use embedded PostgreSQL (true) or external PostgreSQL (false)
  use_embedded: true

  # Embedded PostgreSQL configuration (used when use_embedded: true)
  embedded:
    version: "18.3.0"
    port: 0  # Use 0 for autogit smatic port selection
    bind_address: "127.0.0.1"
    username: "postgres"
    password: "password"
    database: "postgres"

    # Directories for embedded PostgreSQL runtime instance
    installation_dir: "/home/pbya/projects/ziee-chat-data/dev/postgres"
    data_dir: "/home/pbya/projects/ziee-chat-data/dev/postgres-data"

    # Timezone settings
    timezone: "UTC"
    log_timezone: "UTC"

    # Logging configuration for embedded PostgreSQL
    logging:
      collector: true
      directory: "log"
      filename: "postgresql-%Y-%m-%d_%H%M%S.log"
      # `all` writes every SQL statement to the PG log file. Useful
      # when debugging locally, but it captures secret-bearing
      # queries too (encrypted-write parameters are logged as bytea
      # literals — recoverable with the storage_key). Default to
      # `ddl` so the log keeps the useful structural changes but
      # drops per-row values. Closes 14-core F-11 (Medium).
      statement: "ddl"

  # External PostgreSQL configuration (used when use_embedded: false)
  external:
    host: "localhost"
    port: 5432
    username: "postgres"
    password: "password"
    database: "ziee_chat_dev"

  # Connection pool settings (used for both embedded and external)
  pool:
    max_connections: 10
    min_connections: 1
    acquire_timeout_secs: 5
    idle_timeout_secs: 30
    max_lifetime_secs: 300

# Web server settings
server:
  host: "127.0.0.1"
  port: 3000  # Use 0 for automatic port selection
  api_prefix: "/api"  # Base path prefix for all API routes

  # Honor X-Forwarded-Host / X-Forwarded-Proto in OAuth redirect_uri
  # derivation. Dev: Vite proxy forwards X-Forwarded-Host explicitly
  # so the backend can derive the user-facing origin. Production:
  # only enable behind a trusted reverse proxy that STRIPS inbound
  # X-Forwarded-* headers (nginx proxy_set_header / Caddy header_up /
  # Cloudflare default). Otherwise an attacker can send their own
  # X-Forwarded-Host: evil.com directly to the backend and steal
  # OAuth codes via permissive IdPs.
  trust_forwarded_headers: true

  # Per-peer-IP rate limit (tower-governor token bucket). Optional;
  # falls back to (50 req/s, 500-burst) in main.rs::main when unset.
  rate_limit:
    per_second: 50
    burst_size: 500

  # CORS settings
  cors:
    allow_origins:
      - "http://localhost:5173"
      - "http://localhost:3000"
    allow_methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
    allow_headers:
      - "Content-Type"
      - "Authorization"

# Logging settings
logging:
  level: "info"
  format: "pretty"

# JWT authentication settings
jwt:
  secret: "lPzU20E0jWPYjqpCejZ2ng1v2xNh7veS9T2xj7y3G1OGSUnCAaz5gGXEGF8bdbtO"
  issuer: "ziee-chat"
  audience: "ziee-chat-api"
  access_token_expiry_hours: 24  # Access token expires in 24 hours
  refresh_token_expiry_days: 30  # Refresh token expires in 30 days

# At-rest secret storage (pgcrypto / pgp_sym_encrypt).
# Set storage_key to a 32+ char passphrase; the server encrypts api_key /
# token / password columns with it. Unset = compat mode (writes stay in
# plaintext columns, tracing::warn at boot). Production deployments must
# set this via env var or a secrets manager, not the config file.
secrets:
  storage_key: "dev-storage-key-change-in-production-min-32-chars"
