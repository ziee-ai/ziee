<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/svg+xml" href="/vite.svg"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ziee — component gallery</title>
    <!-- Pre-paint theme from the gallery's ?theme= param so the first frame is
         already in the right mode (no light/dark flash before React applies it). -->
    <script>
      (function () {
        try {
          var q = new URLSearchParams(location.search)
          var dark = q.get('theme') === 'dark'
          document.documentElement.classList.toggle('dark', dark)
          document.documentElement.classList.toggle('light', !dark)
          document.documentElement.dir = q.get('dir') === 'rtl' ? 'rtl' : 'ltr'
        } catch (e) {}
      })()
    </script>
</head>
<body>
<div id="root"></div>
<script type="module" src="./dev/gallery/main.tsx"></script>
</body>
</html>
